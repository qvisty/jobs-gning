<!DOCTYPE html>
<html lang="da">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <meta name="robots" content="noindex, nofollow" />
  <title>__TITLE__</title>
  <style>
    :root { color-scheme: light dark; }
    html { scroll-behavior: smooth; }
    * { box-sizing: border-box; }
    body {
      margin: 0; min-height: 100vh; font-family: system-ui, -apple-system, "Segoe UI", Roboto, sans-serif;
      background: linear-gradient(160deg, #0f172a 0%, #1e293b 100%); color: #e2e8f0;
      display: block;
    }
    .content { max-width: 720px; margin: 40px auto; padding: 0 20px; }
    .content .eyebrow { text-transform: uppercase; letter-spacing: .08em; font-size: 12px; color: #818cf8; }
    .content .hero h1 { font-size: 40px; margin: 4px 0 8px; }
    .content .lead { font-size: 18px; color: #cbd5e1; }
    .content .card { background: rgba(30,41,59,.6); border: 1px solid #334155; border-radius: 14px;
      padding: 20px 24px; margin: 20px 0; }
    .content .card h2 { margin-top: 0; }
    .content .commute { color: #94a3b8; font-size: 14px; margin: -6px 0 18px; }
    .content .commute strong { color: #cbd5e1; }
    .content .anonote { color: #94a3b8; font-size: 14px; margin: -6px 0 18px; }
    .content .anonote strong { color: #fcd34d; }
    /* Sticky fasemenu på undersider */
    .content .fasebar { position: sticky; top: 0; z-index: 20; display: flex; flex-wrap: wrap; align-items: center;
      gap: 6px; padding: 12px 0 10px; margin: 0 0 4px; border-bottom: 1px solid #334155;
      background: linear-gradient(160deg, rgba(15,23,42,.97) 0%, rgba(30,41,59,.97) 100%); }
    .content .fasebar a { padding: 5px 11px; border: 1px solid #334155; border-radius: 999px; font-size: 13px;
      color: #cbd5e1; text-decoration: none; white-space: nowrap; }
    .content .fasebar a:hover { border-color: #6366f1; }
    .content .fasebar a.active { border-color: #6366f1; background: rgba(99,102,241,.18); color: #fff; }
    .content .fasebar .home { color: #a5b4fc; }
    .content .fasebar button { margin-left: auto; padding: 5px 11px; border: 1px solid #475569; border-radius: 999px;
      background: transparent; color: #cbd5e1; font-size: 13px; cursor: pointer; }
    .content .fasebar button:hover { border-color: #6366f1; }
    /* Fremdrift for tjeklister */
    .content .progress { display: flex; align-items: center; gap: 12px; margin: 10px 0 0; }
    .content .progress-track { flex: 1 1 auto; height: 8px; border-radius: 999px; background: #0b1220;
      border: 1px solid #334155; overflow: hidden; }
    .content .progress-fill { height: 100%; width: 0; background: #6366f1; border-radius: 999px; transition: width .3s; }
    .content .progress span { font-size: 13px; color: #94a3b8; white-space: nowrap; }
    /* Sammenklappelige fase-kort */
    .content details.card { scroll-margin-top: 76px; }
    .content details.card summary { cursor: pointer; list-style: none; display: flex; align-items: center; gap: 12px; }
    .content details.card summary::-webkit-details-marker { display: none; }
    .content details.card summary h2 { margin: 0; flex: 1 1 auto; }
    .content details.card summary::after { content: '▸'; color: #64748b; font-size: 18px; flex: 0 0 auto;
      transition: transform .2s; }
    .content details.card[open] summary::after { transform: rotate(90deg); }
    .content details.card .fase-body { margin-top: 14px; }
    /* Læsbarhed: luft, linjehøjde og tydeligt hierarki */
    .content p { line-height: 1.65; }
    .content li { line-height: 1.55; }
    .content .fase-body li { margin: 7px 0; }
    .content .fase-body h3 { margin: 28px 0 10px; padding-top: 18px; border-top: 1px solid #26334d; font-size: 19px; }
    .content .fase-body h3:first-child { margin-top: 8px; padding-top: 0; border-top: 0; }
    .content .fase-body h4 { margin: 24px 0 8px; color: #c7d2fe; }
    .content .fase-body h5 { margin: 18px 0 6px; color: #a5b4fc; font-size: 14.5px; }
    .content blockquote { margin: 14px 0; padding: 12px 16px; border-left: 3px solid #6366f1;
      background: rgba(99,102,241,.08); border-radius: 0 10px 10px 0; }
    .content blockquote p { margin: 8px 0; }
    /* Nedtælling på forsiden */
    .content .countdown { text-align: center; font-size: 15px; color: #fcd34d; background: rgba(251,191,36,.08);
      border: 1px solid rgba(251,191,36,.4); border-radius: 10px; padding: 10px 14px; margin: 18px 0 0; }
    .content .countdown:empty { display: none; }
    /* Spørgsmål & svar (øve-kort: svaret er skjult til man klikker) */
    .content details.qa { border: 1px solid #334155; border-radius: 10px; padding: 10px 14px; margin: 8px 0;
      background: rgba(15,23,42,.35); }
    .content details.qa summary { cursor: pointer; list-style: none; display: flex; gap: 10px;
      align-items: baseline; font-weight: 600; color: #e2e8f0; }
    .content details.qa summary::-webkit-details-marker { display: none; }
    .content details.qa summary::before { content: 'Q'; color: #818cf8; font-weight: 700; flex: 0 0 auto; }
    .content details.qa p { margin: 10px 0 4px; color: #cbd5e1; }
    /* Eksport/import af flueben og noter */
    .content .databtns { display: flex; gap: 10px; margin-top: 14px; flex-wrap: wrap; }
    .content .databtns button, .content .databtns .btn-import { display: inline-flex; align-items: center;
      padding: 7px 12px; border: 1px solid #475569; border-radius: 999px; background: transparent;
      color: #cbd5e1; font-size: 13px; cursor: pointer; }
    .content .databtns button:hover, .content .databtns .btn-import:hover { border-color: #6366f1; }
    /* Print: ren sort-på-hvid A4 af det åbne indhold */
    @media print {
      body { background: #fff !important; }
      .content { max-width: 100%; margin: 0; padding: 0; }
      .content * { color: #000 !important; background: transparent !important; border-color: #bbb !important; }
      .fasebar, .progress, .notes, .databtns, .anonote, .foot, #toggle-all { display: none !important; }
      .content .card { border: 0; border-top: 1px solid #999; border-radius: 0; padding: 10px 0; margin: 10px 0; }
      .content details.card summary::after { display: none; }
      .content a { text-decoration: none; }
      .content details.qa { break-inside: avoid; }
    }
    /* Private noter (gemmes kun i browserens localStorage) */
    .content .notes { width: 100%; border: 1px solid #475569; border-radius: 12px; padding: 12px;
      background: #0b1220; color: #f1f5f9; font: inherit; font-size: 14px; resize: vertical; }
    .content .notes:focus { outline: 2px solid #6366f1; border-color: #6366f1; }
    .content a { color: #a5b4fc; }
    .content .backlink { font-size: 14px; margin: 28px 0 -24px; }
    .content .backlink a { text-decoration: none; }
    /* Klikbare stillinger på forsiden */
    .content .joblink { display: block; padding: 16px 20px; margin: 14px 0; border: 1px solid #334155;
      border-radius: 12px; background: rgba(15,23,42,.4); color: inherit; text-decoration: none; }
    .content .joblink:hover { border-color: #6366f1; }
    .content .joblink h3 { margin: 0 0 6px; font-size: 17px; }
    .content .joblink p { margin: 0; color: #94a3b8; font-size: 14px; }
    .content code { background: #0b1220; padding: 2px 6px; border-radius: 6px; font-size: 90%; }
    .content .foot { color: #64748b; font-size: 13px; margin: 40px 0; text-align: center; }
    /* Kalender / tidslinje */
    .content .timeline { list-style: none; margin: 8px 0 0; padding: 0; }
    .content .event { display: flex; gap: 16px; padding: 16px 0; border-top: 1px solid #334155; }
    .content .event:first-child { border-top: 0; }
    .content .event-date { flex: 0 0 64px; text-align: center; background: #0b1220;
      border: 1px solid #334155; border-radius: 10px; padding: 8px 4px; align-self: flex-start; }
    .content .event-date .day { display: block; font-size: 22px; font-weight: 700; line-height: 1.1; color: #f1f5f9; }
    .content .event-date .mon { display: block; font-size: 11px; text-transform: uppercase;
      letter-spacing: .05em; color: #94a3b8; }
    .content .event-body { flex: 1 1 auto; }
    .content .event-body h3 { margin: 6px 0 4px; font-size: 17px; }
    .content .event-body p { margin: 0; color: #cbd5e1; font-size: 14px; }
    .content .tag { display: inline-block; font-size: 11px; font-weight: 600; padding: 2px 9px;
      border-radius: 999px; text-transform: uppercase; letter-spacing: .04em; }
    .content .tag--frist { background: rgba(248,113,113,.15); color: #fca5a5; border: 1px solid #f87171; }
    .content .tag--samtale { background: rgba(129,140,248,.15); color: #a5b4fc; border: 1px solid #818cf8; }
    .content .tag--tiltraedelse { background: rgba(52,211,153,.15); color: #6ee7b7; border: 1px solid #34d399; }
    .content .tag--opfoelgning { background: rgba(251,191,36,.15); color: #fcd34d; border: 1px solid #fbbf24; }
    .content .tag--kladde { background: rgba(251,191,36,.15); color: #fcd34d; border: 1px solid #fbbf24; }
    .content .tag--sendt { background: rgba(52,211,153,.15); color: #6ee7b7; border: 1px solid #34d399; }
    /* Tjeklister med flueben, der huskes i browseren */
    .content .checklist { list-style: none; margin: 8px 0 22px; padding: 0; }
    .content .checklist li { padding: 5px 0; }
    .content .checklist label { display: flex; gap: 10px; align-items: baseline; cursor: pointer; }
    .content .checklist input { accent-color: #6366f1; flex: 0 0 auto; transform: translateY(2px); }
    .content .checklist label:has(input:checked) span { color: #64748b; text-decoration: line-through; }
    /* Svarnoter i samtaleforberedelsen (runde 2) */
    .content .svarnote { display: block; margin-top: 4px; color: #cbd5e1; }
    .content .svarnote em { color: #a5b4fc; font-style: normal; font-weight: 600; }
  </style>
</head>
<body>
  <div class="content">__CONTENT__</div>
  <script>
    // Tjeklister (flueben huskes i browseren), fremdrift, sammenklappelige faser og fasemenu.
    (function () {
      var page = location.pathname.split('/').pop() || 'index';

      // Flueben + fremdrift
      var KEY = 'jobhub:checklist:v1';
      var state = {};
      try { state = JSON.parse(localStorage.getItem(KEY)) || {}; } catch (e) {}
      var boxes = document.querySelectorAll('input[type=checkbox][data-check-id]');
      function updateProgress() {
        var bar = document.getElementById('prog-fill');
        var txt = document.getElementById('prog-text');
        if (!bar || !boxes.length) return;
        var done = 0;
        boxes.forEach(function (b) { if (b.checked) done++; });
        bar.style.width = Math.round(100 * done / boxes.length) + '%';
        if (txt) txt.textContent = done + ' af ' + boxes.length + ' punkter klaret';
      }
      boxes.forEach(function (box) {
        var id = box.getAttribute('data-check-id');
        box.checked = !!state[id];
        box.addEventListener('change', function () {
          state[id] = box.checked;
          try { localStorage.setItem(KEY, JSON.stringify(state)); } catch (e) {}
          updateProgress();
        });
      });
      updateProgress();

      // Nedtælling til næste vigtige dato (forsiden)
      var cd = document.getElementById('countdown');
      if (cd) {
        try {
          var evs = JSON.parse(cd.getAttribute('data-events') || '[]');
          var today = new Date(); today.setHours(0, 0, 0, 0);
          var next = null;
          evs.forEach(function (e) {
            var d = new Date(e[0] + 'T00:00:00');
            if (d >= today && (!next || d < next.d)) next = { d: d, label: e[1] };
          });
          if (next) {
            var days = Math.round((next.d - today) / 86400000);
            var hvornaar = days === 0 ? 'I dag' : days === 1 ? 'I morgen' : 'Om ' + days + ' dage';
            var dato = next.d.getDate() + '/' + (next.d.getMonth() + 1);
            cd.textContent = '⏰ ' + hvornaar + ': ' + next.label + ' (' + dato + ')';
          }
        } catch (e) {}
      }

      // Eksportér/importér flueben og noter (flyt data mellem enheder / backup)
      document.querySelectorAll('.databtns .btn-export').forEach(function (b) {
        b.addEventListener('click', function () {
          var data = {};
          for (var i = 0; i < localStorage.length; i++) {
            var k = localStorage.key(i);
            if (k && k.indexOf('jobhub:') === 0) data[k] = localStorage.getItem(k);
          }
          var blob = new Blob([JSON.stringify(data, null, 2)], { type: 'application/json' });
          var a = document.createElement('a');
          a.href = URL.createObjectURL(blob);
          a.download = 'jobhub-data.json';
          a.click();
          URL.revokeObjectURL(a.href);
        });
      });
      document.querySelectorAll('.databtns .btn-import input[type=file]').forEach(function (inp) {
        inp.addEventListener('change', function () {
          var f = inp.files && inp.files[0];
          if (!f) return;
          var r = new FileReader();
          r.onload = function () {
            try {
              var data = JSON.parse(r.result);
              Object.keys(data).forEach(function (k) {
                if (k.indexOf('jobhub:') === 0) localStorage.setItem(k, data[k]);
              });
              location.reload();
            } catch (e) { alert('Kunne ikke læse filen — er det en jobhub-data.json?'); }
          };
          r.readAsText(f);
        });
      });

      // Print: fold alt ud før print, og fold sammen igen bagefter
      var printPrev = null;
      window.addEventListener('beforeprint', function () {
        var all = document.querySelectorAll('details');
        printPrev = [];
        all.forEach(function (d) { printPrev.push(d.open); d.open = true; });
      });
      window.addEventListener('afterprint', function () {
        if (!printPrev) return;
        var all = document.querySelectorAll('details');
        all.forEach(function (d, i) { d.open = printPrev[i]; });
        printPrev = null;
      });

      // Private noter: gemmes kun lokalt i browseren
      document.querySelectorAll('textarea.notes[data-notes]').forEach(function (t) {
        var nkey = 'jobhub:notes:' + t.getAttribute('data-notes');
        try { t.value = localStorage.getItem(nkey) || ''; } catch (e) {}
        t.addEventListener('input', function () {
          try { localStorage.setItem(nkey, t.value); } catch (e) {}
        });
      });

      // Sammenklappelige faser: åben/lukket huskes pr. side
      var OPENKEY = 'jobhub:open:' + page;
      var openState = null;
      try { openState = JSON.parse(localStorage.getItem(OPENKEY)); } catch (e) {}
      var faser = document.querySelectorAll('details.fase');
      faser.forEach(function (d, i) {
        if (openState && (d.id in openState)) d.open = !!openState[d.id];
        else if (!openState && i === 0) d.open = true;
        d.addEventListener('toggle', function () {
          var st = {};
          faser.forEach(function (x) { st[x.id] = x.open; });
          try { localStorage.setItem(OPENKEY, JSON.stringify(st)); } catch (e) {}
        });
      });

      // Ankerlinks skal åbne den fase, de peger på
      function openFromHash() {
        if (!location.hash) return;
        var el;
        try { el = document.querySelector(location.hash); } catch (e) { return; }
        if (!el) return;
        var d = el.tagName === 'DETAILS' ? el : (el.closest && el.closest('details'));
        if (d && !d.open) d.open = true;
        el.scrollIntoView();
      }
      window.addEventListener('hashchange', openFromHash);
      openFromHash();

      // Åbn alle / luk alle
      var toggleAll = document.getElementById('toggle-all');
      if (toggleAll) toggleAll.addEventListener('click', function () {
        var anyClosed = false;
        faser.forEach(function (d) { if (!d.open) anyClosed = true; });
        faser.forEach(function (d) { d.open = anyClosed; });
        toggleAll.textContent = anyClosed ? 'Luk alle' : 'Åbn alle';
      });

      // Markér aktiv fase i menuen under scroll
      var links = document.querySelectorAll('.fasebar a[href^="#"]');
      if ('IntersectionObserver' in window && links.length) {
        var map = {};
        links.forEach(function (a) { map[a.getAttribute('href').slice(1)] = a; });
        var obs = new IntersectionObserver(function (entries) {
          entries.forEach(function (en) {
            if (en.isIntersecting && map[en.target.id]) {
              links.forEach(function (a) { a.classList.remove('active'); });
              map[en.target.id].classList.add('active');
            }
          });
        }, { rootMargin: '-15% 0px -70% 0px' });
        faser.forEach(function (d) { if (map[d.id]) obs.observe(d); });
      }
    })();
  </script>
</body>
</html>
