<!DOCTYPE html>
<html lang="da">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <meta name="robots" content="noindex, nofollow" />
  <title>Jobsøgning · adgangskode</title>
  <style>
    :root { color-scheme: light dark; }
    * { box-sizing: border-box; }
    body {
      margin: 0; min-height: 100vh; font-family: system-ui, -apple-system, "Segoe UI", Roboto, sans-serif;
      background: linear-gradient(160deg, #0f172a 0%, #1e293b 100%); color: #e2e8f0;
      display: flex; align-items: center; justify-content: center; padding: 24px;
    }
    .gate { width: 100%; max-width: 380px; background: rgba(15,23,42,.6); border: 1px solid #334155;
      border-radius: 16px; padding: 32px 28px; box-shadow: 0 20px 60px rgba(0,0,0,.4); backdrop-filter: blur(6px); }
    .gate h1 { margin: 0 0 4px; font-size: 22px; }
    .gate p { margin: 0 0 20px; color: #94a3b8; font-size: 14px; }
    .gate label { display: block; font-size: 13px; margin-bottom: 6px; color: #cbd5e1; }
    .gate input { width: 100%; padding: 12px 14px; border-radius: 10px; border: 1px solid #475569;
      background: #0b1220; color: #f1f5f9; font-size: 15px; }
    .gate input:focus { outline: 2px solid #6366f1; border-color: #6366f1; }
    .gate button { width: 100%; margin-top: 16px; padding: 12px; border: 0; border-radius: 10px;
      background: #6366f1; color: white; font-size: 15px; font-weight: 600; cursor: pointer; }
    .gate button:hover { background: #4f46e5; }
    .gate button:disabled { opacity: .6; cursor: default; }
    .err { color: #f87171; font-size: 13px; margin-top: 12px; min-height: 18px; }
    /* Beskyttet indhold-styling (vises efter dekryptering) */
    .protected { max-width: 1120px; margin: 32px auto; padding: 0 20px 48px; }
    .protected .eyebrow { text-transform: uppercase; letter-spacing: .08em; font-size: 12px; color: #818cf8; }
    .protected .hero h1 { font-size: 40px; margin: 4px 0 8px; }
    .protected .lead { font-size: 18px; color: #cbd5e1; }
    .protected .card { background: rgba(30,41,59,.6); border: 1px solid #334155; border-radius: 14px;
      padding: 20px 24px; margin: 20px 0; scroll-margin-top: 90px; }
    .protected .card h2 { margin-top: 0; }
    .protected code { background: #0b1220; padding: 2px 6px; border-radius: 6px; font-size: 90%; }
    .protected .foot { color: #64748b; font-size: 13px; margin: 40px 0; text-align: center; }
    /* Kalender / tidslinje */
    .protected .timeline { list-style: none; margin: 8px 0 0; padding: 0; }
    .protected .event { display: flex; gap: 16px; padding: 16px 0; border-top: 1px solid #334155; }
    .protected .event:first-child { border-top: 0; }
    .protected .event-date { flex: 0 0 64px; text-align: center; background: #0b1220;
      border: 1px solid #334155; border-radius: 10px; padding: 8px 4px; align-self: flex-start; }
    .protected .event-date .day { display: block; font-size: 22px; font-weight: 700; line-height: 1.1; color: #f1f5f9; }
    .protected .event-date .mon { display: block; font-size: 11px; text-transform: uppercase;
      letter-spacing: .05em; color: #94a3b8; }
    .protected .event-body { flex: 1 1 auto; }
    .protected .event-body h3 { margin: 6px 0 4px; font-size: 17px; }
    .protected .event-body p { margin: 0; color: #cbd5e1; font-size: 14px; }
    .protected .tag { display: inline-block; font-size: 11px; font-weight: 600; padding: 2px 9px;
      border-radius: 999px; text-transform: uppercase; letter-spacing: .04em; }
    .protected .tag--frist { background: rgba(248,113,113,.15); color: #fca5a5; border: 1px solid #f87171; }
    .protected .tag--samtale { background: rgba(129,140,248,.15); color: #a5b4fc; border: 1px solid #818cf8; }
    .protected .tag--tiltraedelse { background: rgba(52,211,153,.15); color: #6ee7b7; border: 1px solid #34d399; }
    .protected .tag--opfoelgning { background: rgba(251,191,36,.15); color: #fcd34d; border: 1px solid #fbbf24; }
    .protected .table-wrap { overflow-x: auto; margin: 16px 0; border: 1px solid #334155; border-radius: 12px; }
    .protected .job-table { width: 100%; border-collapse: collapse; min-width: 680px; background: rgba(15,23,42,.45); }
    .protected .job-table th, .protected .job-table td { padding: 12px 14px; border-bottom: 1px solid #334155; text-align: left; vertical-align: top; }
    .protected .job-table th { color: #f8fafc; background: rgba(99,102,241,.18); font-size: 13px; text-transform: uppercase; letter-spacing: .04em; }
    .protected .job-table tr:last-child td { border-bottom: 0; }
    .protected .job-table td { color: #cbd5e1; font-size: 14px; }
    .protected .hub-nav { position: sticky; top: 0; z-index: 5; display: flex; gap: 8px; overflow-x: auto;
      margin: 20px 0; padding: 10px; background: rgba(15,23,42,.92); border: 1px solid #334155; border-radius: 14px; backdrop-filter: blur(8px); }
    .protected .hub-nav a, .protected .button-link, .protected .filter-btn { display: inline-flex; align-items: center; justify-content: center;
      border: 1px solid #475569; border-radius: 999px; padding: 8px 12px; color: #e2e8f0; background: rgba(30,41,59,.7); text-decoration: none; white-space: nowrap; cursor: pointer; }
    .protected .hub-nav a:hover, .protected .button-link:hover, .protected .filter-btn:hover, .protected .filter-btn.is-active { border-color: #818cf8; background: rgba(99,102,241,.25); }
    .protected .toolbar { display: flex; flex-wrap: wrap; gap: 8px; margin: 16px 0; }
    .protected .job-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(240px, 1fr)); gap: 14px; }
    .protected .job-card { background: rgba(15,23,42,.55); border: 1px solid #334155; border-radius: 14px; padding: 16px; }
    .protected .job-card[hidden] { display: none; }
    .protected .meta { color: #94a3b8; font-size: 13px; margin: 0 0 8px; }
    .protected .compact-list { padding-left: 18px; }
    .protected .info-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(180px, 1fr)); gap: 10px; margin: 14px 0; }
    .protected .info-grid p { background: rgba(15,23,42,.45); border: 1px solid #334155; border-radius: 12px; margin: 0; padding: 12px; }
    .protected details { background: rgba(15,23,42,.35); border: 1px solid #334155; border-radius: 12px; margin: 12px 0; padding: 12px 14px; }
    .protected summary { cursor: pointer; font-weight: 700; color: #f8fafc; }
    .protected .draft { background: #0b1220; border: 1px dashed #64748b; border-radius: 12px; margin-top: 12px; padding: 14px; }
    .protected .checklist { list-style: none; padding-left: 0; }
    .protected .checklist li { margin: 8px 0; }
    .protected .checklist input { margin-right: 8px; transform: translateY(1px); }
    .protected .notes { width: 100%; border: 1px solid #475569; border-radius: 12px; padding: 12px; background: #0b1220; color: #f8fafc; font: inherit; }
    @media (max-width: 640px) { .protected { padding: 0 12px 36px; } .protected .hero h1 { font-size: 32px; } .protected .card { padding: 16px; } }
    body.unlocked { display: block; background: linear-gradient(160deg, #0f172a 0%, #1e293b 100%); }
  </style>
</head>
<body>
  <div class="gate" id="gate" hidden>
    <h1>🔒 Adgangskode</h1>
    <p>Denne side er privat. Indtast adgangskoden for at få adgang.</p>
    <form id="form" autocomplete="off">
      <label for="pw">Adgangskode</label>
      <input type="password" id="pw" autofocus autocomplete="current-password" />
      <button type="submit" id="submit">Lås op</button>
      <div class="err" id="err" role="alert"></div>
    </form>
  </div>

  <script id="payload" type="application/json">__ENCRYPTED_PAYLOAD__</script>
  <script>
    (function () {
      const data = JSON.parse(document.getElementById('payload').textContent);
      const b64ToBytes = (b64) => Uint8Array.from(atob(b64), (c) => c.charCodeAt(0));
      const bytesToB64 = (buf) => btoa(String.fromCharCode.apply(null, new Uint8Array(buf)));
      const gateEl = document.getElementById('gate');
      const form = document.getElementById('form');
      const pwInput = document.getElementById('pw');
      const errEl = document.getElementById('err');
      const submitBtn = document.getElementById('submit');

      // Session-huskning: efter korrekt adgangskode gemmer vi den AFLEDTE AES-nøgle
      // (ikke selve adgangskoden) i sessionStorage. Så husker fanen adgangen ved
      // genindlæsning/navigation, uden at koden skal tastes igen. sessionStorage er
      // isoleret til den enkelte fane og ryddes automatisk når fanen lukkes — en ny
      // fane eller genåbnet browser kræver derfor koden igen.
      const SESSION_KEY = 'jobsoegning:unlock-key:v1';

      async function deriveKey(password) {
        const enc = new TextEncoder();
        const baseKey = await crypto.subtle.importKey('raw', enc.encode(password), 'PBKDF2', false, ['deriveKey']);
        return crypto.subtle.deriveKey(
          { name: 'PBKDF2', salt: b64ToBytes(data.salt), iterations: data.iterations, hash: 'SHA-256' },
          baseKey,
          { name: 'AES-GCM', length: 256 },
          true, // extractable — nødvendigt for at kunne gemme nøglen i sessionStorage
          ['decrypt']
        );
      }

      async function decryptWithKey(key) {
        const plainBuf = await crypto.subtle.decrypt(
          { name: 'AES-GCM', iv: b64ToBytes(data.iv) },
          key,
          b64ToBytes(data.ct)
        );
        return new TextDecoder().decode(plainBuf);
      }

      function enhanceProtected() {
        document.querySelectorAll('.filter-btn').forEach(function (btn) {
          btn.addEventListener('click', function () {
            const filter = btn.dataset.filter;
            document.querySelectorAll('.filter-btn').forEach((item) => item.classList.toggle('is-active', item === btn));
            document.querySelectorAll('.job-card').forEach(function (card) {
              card.hidden = filter !== 'all' && card.dataset.status !== filter;
            });
          });
        });

        document.querySelectorAll('.checklist').forEach(function (list) {
          const key = 'jobsoegning:checklist:' + list.dataset.list;
          let saved = [];
          try { saved = JSON.parse(localStorage.getItem(key) || '[]'); } catch (_) { saved = []; }
          list.querySelectorAll('input[type="checkbox"]').forEach(function (checkbox, index) {
            checkbox.checked = Boolean(saved[index]);
            checkbox.addEventListener('change', function () {
              const values = Array.from(list.querySelectorAll('input[type="checkbox"]')).map((item) => item.checked);
              try { localStorage.setItem(key, JSON.stringify(values)); } catch (_) {}
            });
          });
        });

        document.querySelectorAll('.notes').forEach(function (notes) {
          const key = 'jobsoegning:notes:' + notes.dataset.notes;
          try { notes.value = localStorage.getItem(key) || ''; } catch (_) {}
          notes.addEventListener('input', function () {
            try { localStorage.setItem(key, notes.value); } catch (_) {}
          });
        });
      }

      function reveal(html) {
        document.body.classList.add('unlocked');
        document.body.innerHTML = '<div class="protected">' + html + '</div>';
        enhanceProtected();
      }

      async function rememberKey(key) {
        try {
          const raw = await crypto.subtle.exportKey('raw', key);
          sessionStorage.setItem(SESSION_KEY, bytesToB64(raw));
        } catch (_) { /* sessionStorage utilgængelig — huskning springes bare over */ }
      }

      // Forsøg at genoprette adgang fra en tidligere korrekt indtastning i denne fane.
      async function restoreFromSession() {
        let stored = null;
        try { stored = sessionStorage.getItem(SESSION_KEY); } catch (_) { return false; }
        if (!stored) return false;
        try {
          const key = await crypto.subtle.importKey(
            'raw', b64ToBytes(stored), { name: 'AES-GCM' }, false, ['decrypt']
          );
          reveal(await decryptWithKey(key));
          return true;
        } catch (_) {
          try { sessionStorage.removeItem(SESSION_KEY); } catch (_) {}
          return false;
        }
      }

      form.addEventListener('submit', async function (e) {
        e.preventDefault();
        errEl.textContent = '';
        submitBtn.disabled = true;
        submitBtn.textContent = 'Låser op…';
        try {
          const key = await deriveKey(pwInput.value);
          const html = await decryptWithKey(key);
          await rememberKey(key);
          reveal(html);
        } catch (_) {
          errEl.textContent = 'Forkert adgangskode. Prøv igen.';
          pwInput.value = '';
          pwInput.focus();
          submitBtn.disabled = false;
          submitBtn.textContent = 'Lås op';
        }
      });

      // Ved indlæsning: vis kun adgangskode-prompten hvis fanen ikke allerede er låst op.
      restoreFromSession().then(function (unlocked) {
        if (!unlocked) {
          gateEl.hidden = false;
          pwInput.focus();
        }
      });
    })();
  </script>
</body>
</html>
